name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent-core:
    name: agent-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: agent-core/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  templates:
    name: templates / ${{ matrix.template }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: [express, library]
    defaults:
      run:
        working-directory: agent-templates/${{ matrix.template }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: agent-templates/${{ matrix.template }}/pnpm-lock.yaml
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck

  sync-check:
    name: templates in sync with agent-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check vendored agent-core is up to date
        run: node .internal/scripts/sync-agent-core.mjs --check
